<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts House Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

</head>

<body>

   <main class="surface">
    <h1 class="title-text">Discover Your Hogwarts House!</h1>

    <input type="text" id="nameInput" placeholder="Enter your name"/>

    <button id="sortButton">Get sorted now</button>
    <button id="retryButton">Try again</button>

    <section id="resultContainer" class="flex-column-center">
         <p id="result" class="title-text"></p>
         <img id="houseImage" alt="">
         <p id="houseDescription" class="text-block"></p>
    </section>
</main>

   <div class="bg-center"></div>

  <script src="script.js"></script>
  
</body>
</html>
